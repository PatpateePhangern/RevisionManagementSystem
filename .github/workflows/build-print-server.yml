name: Build rms_print_server.exe

on:
  push:
    paths:
      - "Exam Timing System/Past Papers Tracking System/rms_print_server.py"
      - "Exam Timing System/Past Papers Tracking System/requirements.txt"
      - ".github/workflows/build-print-server.yml"
  release:
    types: [created]
  workflow_dispatch:   # allow manual trigger from GitHub Actions tab

jobs:
  build-windows-exe:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: "Exam Timing System/Past Papers Tracking System"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pywin32 pyinstaller

      - name: Build rms_print_server.exe
        run: |
          pyinstaller --onefile --noconsole --name rms_print_server rms_print_server.py

      - name: Upload exe as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: rms_print_server-windows
          path: "Exam Timing System/Past Papers Tracking System/dist/rms_print_server.exe"
          retention-days: 90

      # If this run was triggered by creating a GitHub Release, attach the exe
      - name: Attach exe to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: "Exam Timing System/Past Papers Tracking System/dist/rms_print_server.exe"
