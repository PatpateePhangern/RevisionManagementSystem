name: Build rms_print_server.exe

on:
  push:
    paths:
      - "Past Papers Tracking System/rms_print_server.py"
      - "Past Papers Tracking System/requirements.txt"
      - ".github/workflows/build-print-server.yml"
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: "Past Papers Tracking System"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pywin32 pyinstaller

      - name: Download SumatraPDF portable (bundled into exe)
        shell: pwsh
        run: |
          $url = "https://www.sumatrapdfreader.org/dl/rel/3.5.2/SumatraPDF-3.5.2-64.exe"
          Write-Host "Downloading SumatraPDF portable from $url"
          Invoke-WebRequest -Uri $url -OutFile "SumatraPDF.exe"
          $size = (Get-Item "SumatraPDF.exe").Length / 1MB
          Write-Host "Downloaded SumatraPDF.exe — $([math]::Round($size, 1)) MB"

      - name: Build rms_print_server.exe (with SumatraPDF bundled)
        run: |
          pyinstaller `
            --onefile `
            --noconsole `
            --name rms_print_server `
            "--add-data=SumatraPDF.exe;." `
            --hidden-import win32print `
            --hidden-import win32api `
            --hidden-import win32con `
            --hidden-import win32com `
            --hidden-import win32com.client `
            rms_print_server.py

      - name: Verify build output
        shell: pwsh
        run: |
          $exe = "dist\rms_print_server.exe"
          if (Test-Path $exe) {
            $size = (Get-Item $exe).Length / 1MB
            Write-Host "Build succeeded — rms_print_server.exe ($([math]::Round($size, 1)) MB)"
          } else {
            Write-Host "Build failed — exe not found"
            exit 1
          }

      - name: Upload exe as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: rms_print_server-windows
          path: "Past Papers Tracking System/dist/rms_print_server.exe"
          retention-days: 90

      - name: Attach exe to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: "Past Papers Tracking System/dist/rms_print_server.exe"
